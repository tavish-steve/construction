# Render configuration for Flask + PostgreSQL deployment
services:
  - type: web
    name: construction-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: construction-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: construction-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: construction-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: construction-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: construction-db
          property: database
    autoDeploy: true

databases:
  - name: construction-db
    databaseName: construction_db
    user: postgres
    plan: free
    region: ohio
    engine: postgresql
    version: "15"
    ipAllowList: []
    autoDeploy: true
    disableBackup: true