{% extends 'base.html' %}
{% block title %}Login - Water Marc Builders{% endblock %}
{% block page_title %}Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Login</h5>
      </div>
      <div class="card-body">
        <form action="{{ url_for('login') }}" method="POST">
          <div class="mb-3">
            <label for="username" class="form-label"><i class="fas fa-user me-1"></i>Username</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label"><i class="fas fa-key me-1"></i>Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100"><i class="fas fa-sign-in-alt me-1"></i>Login</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('signup') }}">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
