<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <title>Login - Water Marc Builders</title>
    <style>
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        max-width: 400px;
        width: 100%;
      }
      .login-header {
        background: #1a1a2e;
        color: white;
        padding: 30px;
        text-align: center;
      }
      .login-header h3 {
        margin: 0;
        font-size: 1.5rem;
      }
      .login-body {
        padding: 30px;
      }
      .form-control {
        border-radius: 5px;
        padding: 12px;
        border: 1px solid #ddd;
      }
      .form-control:focus {
        border-color: #1a1a2e;
        box-shadow: 0 0 0 0.2rem rgba(26, 26, 46, 0.25);
      }
      .btn-login {
        background: #1a1a2e;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 5px;
        font-weight: 600;
        transition: background 0.3s;
      }
      .btn-login:hover {
        background: #16213e;
      }
      .error-message {
        color: #dc3545;
        font-size: 0.875rem;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <h3><i class="fas fa-hard-hat me-2"></i>Water Marc Builders</h3>
        <p class="mb-0 mt-2" style="opacity: 0.8;">Enter password to continue</p>
      </div>
      <div class="login-body">
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              name="password" 
              placeholder="Enter password"
              required
              autofocus
            />
          </div>
          {% if error %}
          <div class="error-message">{{ error }}</div>
          {% endif %}
          <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
