<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Custom Global Styles -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <!-- DataTables CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.css"
    />
    <!-- DataTables Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.js"></script>
    <title>{% block title %}Water Marc Builders{% endblock %}</title>
  </head>
  
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">Water Marc Builders</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="fas fa-home me-1"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/clients"><i class="fas fa-users me-1"></i> Clients</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/employees"><i class="fas fa-hard-hat me-1"></i> Employees</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/projects"><i class="fas fa-building me-1"></i> Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/materials"><i class="fas fa-boxes me-1"></i> Materials</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/purchases"><i class="fas fa-shopping-cart me-1"></i> Purchases</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/payments"><i class="fas fa-money-bill-wave me-1"></i> Payments</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/reports"><i class="fas fa-chart-bar me-1"></i> Reports</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-main">
      <div class="page-header">
        <h2>{% block page_title %}{% endblock %}</h2>
      </div>
      {% block content %}
      
      
      {% endblock %}
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
